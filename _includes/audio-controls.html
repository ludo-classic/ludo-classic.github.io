<style>
  .audio-bar-wrapper {
    width: 100%;
    max-width: 740px;
    height: 46px;
    background: rgba(0, 0, 0, 0.04);
    border: 1px solid var(--pbr);
    border-radius: 10px;
    align-items: center;
    justify-content: space-around;
    padding: 0 14px;
    margin-bottom: 10px;
    display: none;
  }
  .audio-btn {
    background: transparent;
    border: none;
    font-size: 1.18rem;
    color: #475569;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    outline: none;
  }
  .audio-btn:hover { color: var(--gold); transform: scale(1.08); }
  .audio-btn:active { transform: scale(0.92); }
  .audio-btn.muted { color: #dc2626; }
  .audio-btn.muted::after {
    content: '';
    position: absolute;
    top: 50%;
    left: -4px;
    right: -4px;
    height: 2px;
    background: #dc2626;
    transform: translateY(-50%) rotate(45deg);
    border-radius: 2px;
  }
  .voice-menu-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 9998;
  }
  .voice-menu-overlay.active { display: block; }
  .voice-menu {
    position: absolute;
    bottom: 72px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid var(--gold);
    border-radius: 10px;
    padding: 10px;
    width: 230px;
    box-shadow: 0 10px 26px rgba(0,0,0,0.5);
    color: #fff;
    z-index: 9999;
    font-family: 'Rajdhani', sans-serif;
  }
  .voice-menu-header {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--gold);
    border-bottom: 1px solid rgba(154,123,44,0.3);
    padding-bottom: 6px;
    margin-bottom: 8px;
    text-align: center;
  }
  .voice-players-list { display: flex; flex-direction: column; gap: 7px; }
  .voice-player {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.05);
    padding: 6px 9px;
    border-radius: 7px;
    min-height: 34px;
  }
  .vp-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .vp-name { flex: 1; margin-left: 9px; font-weight: 600; font-size: 0.84rem; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .vp-toggle {
    background: transparent;
    border: none;
    color: #69f0ae;
    cursor: pointer;
    font-size: 0.98rem;
    transition: all 0.2s;
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .vp-toggle.muted { color: #ff8a80; }
  .vp-empty { color: #cbd5e1; font-size: 0.8rem; text-align: center; padding: 7px 4px; }
</style>

<div class="audio-bar-wrapper" id="audio-bar-wrapper">
  <button class="audio-btn" id="btn-bgm" onclick="window.toggleBGM()"><i class="fas fa-music"></i></button>
  <button class="audio-btn" id="btn-sfx" onclick="window.toggleSFX()"><i class="fas fa-volume-up"></i></button>
  <button class="audio-btn muted" id="btn-mic" onclick="window.toggleMic()"><i class="fas fa-microphone"></i></button>
  <button class="audio-btn" id="btn-speaker" onclick="window.toggleVoiceMenu()"><i class="fas fa-headphones"></i></button>
</div>

<div class="voice-menu-overlay" id="voice-menu-overlay" onclick="window.toggleVoiceMenu(false)">
  <div class="voice-menu" onclick="event.stopPropagation()">
    <div class="voice-menu-header">Voice Chat Players</div>
    <div class="voice-players-list" id="voice-players-list"></div>
  </div>
</div>

<script>
window.isBgmEnabled = true;
window.isSfxEnabled = true;
window.isMicEnabled = false;

let myPeer = null;
let myLocalStream = null;
const connectedPeers = {};
const peerDataConnections = {};
const remoteAudioElements = {};
const localMutedPlayers = {};
const voicePlayerCache = {};

const COLOR_HEX = { red: '#c62828', green: '#2e7d32', yellow: '#f9a825', blue: '#1565c0' };

function safeVoiceName(player, fallback) {
  const raw = player && (player.name || player.displayName || player.username || player.nick);
  const name = String(raw || '').trim();
  if (name) return name;
  const uid = String((player && player.uid) || fallback || '').trim();
  return uid ? 'Player ' + uid.slice(0, 4) : 'Player';
}

function getVoiceUid(player) {
  return String((player && player.uid) || '').trim();
}

async function ensureMicStream() {
  if (myLocalStream) return myLocalStream;
  try {
    myLocalStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
    const track = myLocalStream.getAudioTracks()[0];
    if (track) track.enabled = window.isMicEnabled;
  } catch (err) {
    myLocalStream = null;
  }
  return myLocalStream;
}

window.toggleBGM = function() {
  window.isBgmEnabled = !window.isBgmEnabled;
  const btn = document.getElementById('btn-bgm');
  if (btn) btn.classList.toggle('muted', !window.isBgmEnabled);
  const bgm = document.getElementById('bgm-snd');
  if (!bgm) return;
  if (!window.isBgmEnabled) {
    bgm.pause();
  } else if (document.getElementById('game-screen')?.classList.contains('active')) {
    bgm.play().catch(()=>{});
  }
};

window.toggleSFX = function() {
  window.isSfxEnabled = !window.isSfxEnabled;
  const btn = document.getElementById('btn-sfx');
  if (btn) btn.classList.toggle('muted', !window.isSfxEnabled);
};

window.toggleVoiceMenu = function(forceState) {
  const overlay = document.getElementById('voice-menu-overlay');
  if (!overlay) return;
  if (typeof forceState === 'boolean') overlay.classList.toggle('active', forceState);
  else overlay.classList.toggle('active');
};

window.initVoiceChat = async function(myUid) {
  if (myPeer) return;
  await ensureMicStream();
  myPeer = new Peer(myUid, { debug: 0 });
  myPeer.on('connection', conn => handlePeerDataConnection(conn));
  myPeer.on('call', async call => {
    await ensureMicStream();
    try {
      if (myLocalStream) call.answer(myLocalStream);
      else call.answer();
    } catch (err) {}
    handleRemoteCall(call);
  });
};

function handlePeerDataConnection(conn) {
  if (!conn) return null;
  const targetUid = String(conn.peer || '').trim();
  if (!targetUid) return conn;
  peerDataConnections[targetUid] = conn;
  conn.on('data', data => {
    if (data && data.type === 'emoji' && window.receivePeerEmoji) {
      window.receivePeerEmoji(data);
    }
  });
  const cleanup = () => {
    if (peerDataConnections[targetUid] === conn) delete peerDataConnections[targetUid];
  };
  conn.on('close', cleanup);
  conn.on('error', cleanup);
  return conn;
}

function ensurePeerDataConnection(targetUid) {
  targetUid = String(targetUid || '').trim();
  if (!targetUid || !myPeer || myPeer.destroyed) return null;
  const existing = peerDataConnections[targetUid];
  if (existing && existing.open) return existing;
  if (existing) {
    try { existing.close(); } catch (err) {}
    delete peerDataConnections[targetUid];
  }
  try {
    const conn = myPeer.connect(targetUid, { label: 'ludo-events', reliable: true });
    return handlePeerDataConnection(conn);
  } catch (err) {
    return null;
  }
}

window.sendPeerEmoji = function(payload) {
  if (!payload || !myPeer || myPeer.destroyed) return 0;
  let sent = 0;
  Object.keys(voicePlayerCache).forEach(uid => {
    const conn = ensurePeerDataConnection(uid);
    if (!conn) return;
    const sendNow = () => {
      try { conn.send(payload); sent += 1; } catch (err) {}
    };
    if (conn.open) sendNow();
    else if (conn.once) conn.once('open', sendNow);
  });
  return sent;
};

window.toggleMic = async function() {
  await ensureMicStream();
  if (!myLocalStream) return;
  window.isMicEnabled = !window.isMicEnabled;
  myLocalStream.getAudioTracks().forEach(track => track.enabled = window.isMicEnabled);
  const btn = document.getElementById('btn-mic');
  if (btn) btn.classList.toggle('muted', !window.isMicEnabled);
};

window.togglePlayerMute = function(targetUid) {
  targetUid = String(targetUid || '').trim();
  if (!targetUid) return;
  localMutedPlayers[targetUid] = !localMutedPlayers[targetUid];
  if (remoteAudioElements[targetUid]) remoteAudioElements[targetUid].muted = !!localMutedPlayers[targetUid];
  const btn = document.getElementById('btn-mute-' + targetUid);
  if (btn) {
    btn.classList.toggle('muted', !!localMutedPlayers[targetUid]);
    btn.innerHTML = localMutedPlayers[targetUid] ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
  }
};

function handleRemoteCall(call) {
  const targetUid = String(call.peer || '').trim();
  if (!targetUid) return;
  connectedPeers[targetUid] = call;
  call.on('stream', remoteStream => {
    if (!remoteAudioElements[targetUid]) {
      const audio = document.createElement('audio');
      audio.autoplay = true;
      audio.id = 'remote-audio-' + targetUid;
      audio.muted = !!localMutedPlayers[targetUid];
      document.body.appendChild(audio);
      remoteAudioElements[targetUid] = audio;
    }
    remoteAudioElements[targetUid].srcObject = remoteStream;
  });
  call.on('close', () => cleanupRemote(targetUid));
  call.on('error', () => cleanupRemote(targetUid));
}

function cleanupRemote(targetUid) {
  targetUid = String(targetUid || '').trim();
  if (!targetUid) return;
  if (remoteAudioElements[targetUid]) {
    remoteAudioElements[targetUid].remove();
    delete remoteAudioElements[targetUid];
  }
  if (connectedPeers[targetUid]) {
    try { connectedPeers[targetUid].close(); } catch (err) {}
    delete connectedPeers[targetUid];
  }
}

function renderVoiceEmpty(listContainer) {
  const empty = document.createElement('div');
  empty.className = 'vp-empty';
  empty.textContent = 'No players connected';
  listContainer.appendChild(empty);
}

window.syncVoicePeers = async function(players, myUid) {
  const listContainer = document.getElementById('voice-players-list');
  if (!listContainer) return;
  listContainer.innerHTML = '';
  const myId = String(myUid || '').trim();
  const onlinePlayers = (Array.isArray(players) ? players : []).filter(p => p && p.isOnline !== false && getVoiceUid(p) && getVoiceUid(p) !== myId);
  const activeUids = new Set(onlinePlayers.map(getVoiceUid));
  Object.keys(connectedPeers).forEach(uid => { if (!activeUids.has(uid)) cleanupRemote(uid); });
  Object.keys(peerDataConnections).forEach(uid => {
    if (!activeUids.has(uid)) {
      try { peerDataConnections[uid].close(); } catch (err) {}
      delete peerDataConnections[uid];
    }
  });
  Object.keys(voicePlayerCache).forEach(uid => {
    if (!activeUids.has(uid)) delete voicePlayerCache[uid];
  });
  if (onlinePlayers.length === 0) {
    renderVoiceEmpty(listContainer);
    return;
  }
  onlinePlayers.forEach(p => {
    const uid = getVoiceUid(p);
    voicePlayerCache[uid] = p;
    ensurePeerDataConnection(uid);
    if (myPeer && myLocalStream && !connectedPeers[uid]) {
      try {
        const call = myPeer.call(uid, myLocalStream);
        if (call) handleRemoteCall(call);
      } catch (err) {}
    }
    const isMuted = !!localMutedPlayers[uid];
    const row = document.createElement('div');
    row.className = 'voice-player';
    const dot = document.createElement('div');
    dot.className = 'vp-dot';
    dot.style.background = COLOR_HEX[p.color] || '#ccc';
    const name = document.createElement('div');
    name.className = 'vp-name';
    name.textContent = safeVoiceName(p, uid);
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.id = 'btn-mute-' + uid;
    btn.className = 'vp-toggle' + (isMuted ? ' muted' : '');
    btn.innerHTML = isMuted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
    btn.addEventListener('click', () => window.togglePlayerMute(uid));
    row.appendChild(dot);
    row.appendChild(name);
    row.appendChild(btn);
    listContainer.appendChild(row);
  });
};

window.closeVoiceChat = function() {
  Object.keys(connectedPeers).forEach(cleanupRemote);
  Object.keys(peerDataConnections).forEach(uid => {
    try { peerDataConnections[uid].close(); } catch (err) {}
    delete peerDataConnections[uid];
  });
  if (myPeer) {
    try { myPeer.destroy(); } catch (err) {}
  }
  if (myLocalStream) {
    myLocalStream.getTracks().forEach(track => track.stop());
  }
  Object.keys(remoteAudioElements).forEach(uid => {
    if (remoteAudioElements[uid]) remoteAudioElements[uid].remove();
    delete remoteAudioElements[uid];
  });
  Object.keys(voicePlayerCache).forEach(uid => delete voicePlayerCache[uid]);
  myPeer = null;
  myLocalStream = null;
  window.isMicEnabled = false;
  const btn = document.getElementById('btn-mic');
  if (btn) btn.classList.add('muted');
};
</script>
