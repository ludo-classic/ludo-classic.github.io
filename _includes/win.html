<style>
  #win-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 9998; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  #win-overlay.active { display: flex; }
  .win-title { font-family: 'Cinzel Decorative', serif; font-size: clamp(1rem, 5vw, 2.4rem); color: var(--gold); text-align: center; text-shadow: 0 0 40px rgba(201,168,76,.6); letter-spacing: 4px; animation: glow 2s ease-in-out infinite alternate; }
