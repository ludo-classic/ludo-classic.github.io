---
layout: default
title: "404 - Page Not Found"
description: "Oops! The page you are looking for doesn't exist."
---

<meta name="robots" content="noindex, nofollow">

<style>
  .error-container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
    background: #0d1117;
  }
  .err-msg {
    color: #4a6080;
    font-size: 1.1rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 25px;
  }
  .err-btn {
    padding: 14px 40px;
    border: none;
    border-radius: 9px;
    background: linear-gradient(135deg, #a07828, #c9a84c);
    color: #0d1117;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
    display: inline-block;
    transition: all .2s;
  }
  .err-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(201,168,76,.25);
  }
</style>

<div class="error-container">
  <!-- Lottie animation mein 404 included hai -->
  <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.6.2/dist/dotlottie-wc.js" type="module"></script>
  <dotlottie-wc src="https://lottie.host/1f40ef9f-360f-4ae2-b18e-b204b9167bb2/V4UuTjVSmt.lottie" style="width: 250px; height: 250px; margin-bottom: 10px;" speed="1" autoplay loop></dotlottie-wc>
  
  <p class="err-msg">Oops! Page not found.</p>

  <a href="{{ '/' | relative_url }}" class="err-btn">
    Go to Home
  </a>
</div>
